name: evpn-multisite

mgmt:
  network: mgmt-ext
  ipv4-subnet: 192.168.129.0/24
  ipv4-range: 192.168.129.176/28
  bridge: bridge0

topology:
  kinds:
    cisco_n9kv:
      image: vrnetlab/cisco_n9kv:10.5.4.M.lite
      # startup-config: raw/__clabNodeName___run.txt
      env:
        QEMU_MEMORY: 4608 # 6144 (6G) # Minimum RAM 4.5 G (4608 MB) (basic bootup) 10.5(3)F ~ . Recommended RAM 8G 
        QEMU_SMP: 2
        CLAB_MGMT_PASSTHROUGH: "true"
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:24.10
      type: ixr-d3
    arista_ceos:
      image: ceos:4.35.4M # ceos:4.32.0F
      env:
        CLAB_MGMT_VRF: MGMT
    linux:
      image: ghcr.io/hellt/network-multitool:latest
    # k8s-kind:
    #   image: kindest/node:v1.34.3 # Kubernetes Version 指定
  nodes:
    # wan
    ## p
    p01:
      kind: arista_ceos
      mgmt-ipv4: 192.168.129.170
      group: wan
      startup-config: configs/ceos_wan_underlay/__clabNodeName__.cfg
    ## pe
    pe01:
      kind: arista_ceos
      mgmt-ipv4: 192.168.129.161
      group: wan
      startup-config: configs/ceos_wan_underlay/__clabNodeName__.cfg
    pe02:
      kind: arista_ceos
      mgmt-ipv4: 192.168.129.162
      group: wan
      startup-config: configs/ceos_wan_underlay/__clabNodeName__.cfg
    pe03:
      kind: arista_ceos
      mgmt-ipv4: 192.168.129.163
      group: wan
      startup-config: configs/ceos_wan_underlay/__clabNodeName__.cfg
    pe04:
      kind: arista_ceos
      mgmt-ipv4: 192.168.129.164
      group: wan
      startup-config: configs/ceos_wan_underlay/__clabNodeName__.cfg
    # route-server
    adc-rs0101: 
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.171
      group: rs
      startup-delay: 1800 # 30*60sec
    adc-rs0102: 
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.172
      group: rs
      startup-delay: 1800 # 30*60sec
    bdc-rs0101: 
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.173
      group: rs
      startup-delay: 1800 # 30*60sec
    bdc-rs0102: 
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.174
      group: rs
      startup-delay: 1800 # 30*60sec
    # A DataCenter
    ## bgw
    adc-bgw0101:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.138
      group: bgw
    adc-bgw0102:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.137
      group: bgw
    ## spine
    adc-spsw0101:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.140
      group: spine
    adc-spsw0102:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.139
      group: spine
    ## leaf
    adc-lfsw0101:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.131
      group: leaf
    adc-lfsw0102:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.132
      group: leaf
    adc-lfsw0103:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.133
      group: leaf
      startup-delay: 600 # 10*60sec 
    adc-lfsw0104:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.134
      group: leaf
      startup-delay: 600 # 10*60sec
    # B DataCenter
    ## bgw
    bdc-bgw0101:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.148
      group: bgw
      startup-delay: 600 # 10*60sec
    bdc-bgw0102:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.147
      group: bgw
      startup-delay: 600 # 10*60sec
    ## spine
    bdc-spsw0101:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.150
      group: spine
      startup-delay: 600 # 10*60sec
    ## leaf
    bdc-lfsw0101:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.141
      group: leaf
      startup-delay: 1200 # 20*60sec
    bdc-lfsw0102:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.142
      group: leaf
      startup-delay: 1200 # 20*60sec

    # C DataCenter
    ## bgw
    cdc-bgw0101:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.158
      group: bgw
      startup-delay: 1200 # 20*60sec
    cdc-bgw0102:
      kind: cisco_n9kv
      mgmt-ipv4: 192.168.129.157
      group: bgw
      startup-delay: 1200 # 20*60sec
    ## l3sw
    cdc-l3sw0101:
      kind: arista_ceos
      mgmt-ipv4: 192.168.129.151
      group: l3sw
      startup-config: configs/__clabNodeName__.cfg
      # startup-delay: 420 # 7*60sec 
    cdc-l3sw0102:
      kind: arista_ceos
      mgmt-ipv4: 192.168.129.152
      group: l3sw
      startup-config: configs/__clabNodeName__.cfg
      # startup-delay: 420 # 7*60sec 

# Server
    controller-server01:
      kind: linux
      env:
        VLAN_ID: "2001"
        IP_CIDR: "100.64.0.1/24"
        DEF_GW: "100.64.0.254"
        IPV6_CIDR: "fd12:0:0:1::101/64"
        DEF_GW6: "fd12:0:0:1::1"
        SET_DEFAULT_ROUTE: "true"
      binds:
        - scripts/linux:/scripts:ro
      exec:
        - sh -lc '/scripts/init-bond-singlevlan-route.sh'
      group: server
    controller-server02:
      kind: linux
      env:
        VLAN_ID: "2002"
        IP_CIDR: "100.64.1.1/24"
        DEF_GW: "100.64.1.254"
        IPV6_CIDR: "fd12:0:0:2::101/64"
        DEF_GW6: "fd12:0:0:2::1"
        SET_DEFAULT_ROUTE: "true"
      binds:
        - scripts/linux:/scripts:ro
      exec:
        - sh -lc '/scripts/init-bond-singlevlan-route.sh'
      group: server
