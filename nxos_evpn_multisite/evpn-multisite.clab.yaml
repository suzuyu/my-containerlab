      group: server

  links:
    # WAN
    # P
    - endpoints: ["p01:eth1", "pe01:eth8"]
    - endpoints: ["p01:eth2", "pe02:eth8"]
    - endpoints: ["p01:eth3", "pe03:eth8"]
    - endpoints: ["p01:eth4", "pe04:eth8"]
    # PE01
    - endpoints: ["pe01:eth1", "adc-rs0101:Ethernet1/1"]
    - endpoints: ["pe01:eth2", "adc-rs0102:Ethernet1/1"]
    - endpoints: ["pe01:eth3", "adc-bgw0101:Ethernet1/8"]
    - endpoints: ["pe01:eth4", "adc-bgw0102:Ethernet1/8"]
    - endpoints: ["pe01:eth7", "pe02:eth7"]
    # PE02
    - endpoints: ["pe02:eth1", "adc-rs0101:Ethernet1/2"]
    - endpoints: ["pe02:eth2", "adc-rs0102:Ethernet1/2"]
    - endpoints: ["pe02:eth3", "adc-bgw0101:Ethernet1/7"]
    - endpoints: ["pe02:eth4", "adc-bgw0102:Ethernet1/7"]
    # PE03
    - endpoints: ["pe03:eth1", "bdc-rs0101:Ethernet1/1"]
    - endpoints: ["pe03:eth2", "bdc-rs0102:Ethernet1/1"]
    - endpoints: ["pe03:eth3", "bdc-bgw0101:Ethernet1/8"]
    - endpoints: ["pe03:eth4", "bdc-bgw0102:Ethernet1/8"]
    - endpoints: ["pe03:eth5", "cdc-bgw0101:Ethernet1/8"]
    - endpoints: ["pe03:eth6", "cdc-bgw0102:Ethernet1/8"]
    - endpoints: ["pe03:eth7", "pe04:eth7"]
    # PE04
    - endpoints: ["pe04:eth1", "bdc-rs0101:Ethernet1/2"]
    - endpoints: ["pe04:eth2", "bdc-rs0102:Ethernet1/2"]
    - endpoints: ["pe04:eth3", "bdc-bgw0101:Ethernet1/7"]
    - endpoints: ["pe04:eth4", "bdc-bgw0102:Ethernet1/7"]
    - endpoints: ["pe04:eth5", "cdc-bgw0101:Ethernet1/7"]
    - endpoints: ["pe04:eth6", "cdc-bgw0102:Ethernet1/7"]

    # DC Site A
    # adc-bgw0101
    - endpoints: ["adc-bgw0101:Ethernet1/1", "adc-spsw0101:Ethernet1/8"]
    - endpoints: ["adc-bgw0101:Ethernet1/2", "adc-spsw0102:Ethernet1/8"]
    # adc-bgw0102
    - endpoints: ["adc-bgw0102:Ethernet1/1", "adc-spsw0101:Ethernet1/7"]
    - endpoints: ["adc-bgw0102:Ethernet1/2", "adc-spsw0102:Ethernet1/7"]
    # adc-spsw0101
    - endpoints: ["adc-spsw0101:Ethernet1/1", "adc-lfsw0101:Ethernet1/8"]
    - endpoints: ["adc-spsw0101:Ethernet1/2", "adc-lfsw0102:Ethernet1/8"]
    - endpoints: ["adc-spsw0101:Ethernet1/3", "adc-lfsw0103:Ethernet1/8"]
    - endpoints: ["adc-spsw0101:Ethernet1/4", "adc-lfsw0104:Ethernet1/8"]
    # adc-spsw0102
    - endpoints: ["adc-spsw0102:Ethernet1/1", "adc-lfsw0101:Ethernet1/7"]
    - endpoints: ["adc-spsw0102:Ethernet1/2", "adc-lfsw0102:Ethernet1/7"]
    - endpoints: ["adc-spsw0102:Ethernet1/3", "adc-lfsw0103:Ethernet1/7"]
    - endpoints: ["adc-spsw0102:Ethernet1/4", "adc-lfsw0104:Ethernet1/7"]
    # adc-lfsw0101
    - endpoints: ["adc-lfsw0101:Ethernet1/1",  "controller-server01:eth1"]
    - endpoints: ["adc-lfsw0101:Ethernet1/2",  "tenant1-server01:eth1"]
    - endpoints: ["adc-lfsw0101:Ethernet1/3",  "tenant2-server01:eth1"]
    # adc-lfsw0102
    - endpoints: ["adc-lfsw0102:Ethernet1/1",  "controller-server01:eth2"]
    - endpoints: ["adc-lfsw0102:Ethernet1/2",  "tenant1-server01:eth2"]
    - endpoints: ["adc-lfsw0102:Ethernet1/3",  "tenant2-server01:eth2"]
    # adc-lfsw0103
    - endpoints: ["adc-lfsw0103:Ethernet1/1", "tenant1-server02:eth1"]
    - endpoints: ["adc-lfsw0103:Ethernet1/2", "tenant1-server03:eth1"]
    - endpoints: ["adc-lfsw0103:Ethernet1/3", "tenant2-server02:eth1"]
    # adc-lfsw0104
    - endpoints: ["adc-lfsw0104:Ethernet1/1", "tenant1-server02:eth2"]
    - endpoints: ["adc-lfsw0104:Ethernet1/2", "tenant1-server03:eth2"]
    - endpoints: ["adc-lfsw0104:Ethernet1/3", "tenant2-server02:eth2"]

    # DC Site B
    # bdc-bgw0101
    - endpoints: ["bdc-bgw0101:Ethernet1/1", "bdc-spsw0101:Ethernet1/8"]
    # bdc-bgw0102
    - endpoints: ["bdc-bgw0102:Ethernet1/1", "bdc-spsw0101:Ethernet1/7"]
    # bdc-spsw0101
    - endpoints: ["bdc-spsw0101:Ethernet1/1", "bdc-lfsw0101:Ethernet1/8"]
    - endpoints: ["bdc-spsw0101:Ethernet1/2", "bdc-lfsw0102:Ethernet1/8"]
    # bdc-lfsw0101
    - endpoints: ["bdc-lfsw0101:Ethernet1/1",  "controller-server02:eth1"]
    - endpoints: ["bdc-lfsw0101:Ethernet1/2",  "tenant1-server04:eth1"]
    # - endpoints: ["bdc-lfsw0101:Ethernet1/3",  "tenant2-server03:eth1"]
    # bdc-lfsw0102
    - endpoints: ["bdc-lfsw0102:Ethernet1/1",  "controller-server02:eth2"]
    - endpoints: ["bdc-lfsw0102:Ethernet1/2",  "tenant1-server04:eth2"]
    # - endpoints: ["bdc-lfsw0102:Ethernet1/3",  "tenant2-server03:eth2"]

    # DC Site C
    # cdc-bgw0101
    - endpoints: ["cdc-bgw0101:Ethernet1/1", "cdc-l3sw0101:eth8"] # L2 vPC/MLAG
    - endpoints: ["cdc-bgw0101:Ethernet1/2", "cdc-l3sw0102:eth8"] # L2 vPC/MLAG
    - endpoints: ["cdc-bgw0101:Ethernet1/3", "cdc-l3sw0101:eth10"] # L3 Mesh VRF SubIF
    - endpoints: ["cdc-bgw0101:Ethernet1/4", "cdc-l3sw0102:eth10"] # L3 Mesh VRF SubIF
    - endpoints: ["cdc-bgw0101:Ethernet1/5", "cdc-bgw0102:Ethernet1/5"] # WATARI 
    - endpoints: ["cdc-bgw0101:Ethernet1/6", "cdc-bgw0102:Ethernet1/6"] # WATARI
    # - endpoints: ["cdc-bgw0101:Ethernet1/7", "pe04:eth5"] # 重複のためコメント
    # - endpoints: ["cdc-bgw0101:Ethernet1/8", "pe03:eth5"] # 重複のためコメント
    # cdc-bgw0102
    - endpoints: ["cdc-bgw0102:Ethernet1/1", "cdc-l3sw0101:eth7"] # L2 vPC/MLAG
    - endpoints: ["cdc-bgw0102:Ethernet1/2", "cdc-l3sw0102:eth7"] # L2 vPC/MLAG
    - endpoints: ["cdc-bgw0102:Ethernet1/3", "cdc-l3sw0101:eth9"] # L3 Mesh VRF SubIF
    - endpoints: ["cdc-bgw0102:Ethernet1/4", "cdc-l3sw0102:eth9"] # L3 Mesh VRF SubIF
    # - endpoints: ["cdc-bgw0102:Ethernet1/5", "cdc-bgw0101:Ethernet1/5"] # 重複のためコメント
    # - endpoints: ["cdc-bgw0102:Ethernet1/6", "cdc-bgw0101:Ethernet1/6"] # 重複のためコメント
    # - endpoints: ["cdc-bgw0102:Ethernet1/7", "pe04:eth6"] # 重複のためコメント
    # - endpoints: ["cdc-bgw0102:Ethernet1/8", "pe03:eth6"] # 重複のためコメント
    # cdc-l3sw0101
    - endpoints: ["cdc-l3sw0101:eth1", "cdc-server01:eth1"]
    - endpoints: ["cdc-l3sw0101:eth2", "cdc-server02:eth1"]
    - endpoints: ["cdc-l3sw0101:eth5", "cdc-l3sw0102:eth5"]
    - endpoints: ["cdc-l3sw0101:eth6", "cdc-l3sw0102:eth6"]
    # cdc-l3sw0102
    - endpoints: ["cdc-l3sw0102:eth1", "cdc-server01:eth2"]
    - endpoints: ["cdc-l3sw0102:eth2", "cdc-server02:eth2"]
