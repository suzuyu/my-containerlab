    tenant2-server01:
      kind: linux
      env:
        VLAN_ID: "200"
        IP_CIDR: "172.17.0.1/24"
        DEF_GW: "172.17.0.254"
        IPV6_CIDR: "fd22:0:0:1::101/64"
        DEF_GW6: "fd22:0:0:1::1"
        SET_DEFAULT_ROUTE: "true"
      binds:
        - scripts/linux:/scripts:ro
      exec:
        - sh -lc '/scripts/init-bond-singlevlan-route.sh'
      group: server
    tenant2-server02:
      kind: linux
      env:
        VLAN_ID: "20"
        IP_CIDR: "172.17.0.2/24"
        DEF_GW: "172.17.0.254"
        IPV6_CIDR: "fd22:0:0:1::102/64"
