    # tenant2-server03:
    #   kind: linux
    #   env:
    #     VLAN_ID: "21"
    #     IP_CIDR: "172.17.1.1/24"
    #     DEF_GW: "172.17.1.254"
    #     IPV6_CIDR: "fd22:0:0:2::101/64"
    #     DEF_GW6: "fd22:0:0:2::1"
    #     SET_DEFAULT_ROUTE: "true"
    #   binds:
    #     - scripts/linux:/scripts:ro
    #   exec:
    #     - sh -lc '/scripts/init-bond-singlevlan-route.sh'
    #   group: server
    cdc-server01:
      kind: linux
      env:
        VLAN_ID: "300"
        IP_CIDR: "172.18.0.1/24"
        DEF_GW: "172.18.0.254"
        IPV6_CIDR: "fd22:0:1:1::101/64"
        DEF_GW6: "fd22:0:1:1::1"
