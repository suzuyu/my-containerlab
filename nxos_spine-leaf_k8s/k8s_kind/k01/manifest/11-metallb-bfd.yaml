# https://metallb.universe.tf/configuration/#enabling-bfd-support-for-bgp-sessions
apiVersion: metallb.io/v1beta1
kind: BFDProfile
metadata:
  name: bfdprofile
  namespace: metallb-system
spec:
  echoMode: false
  receiveInterval: 2000
  transmitInterval: 300
  echoInterval: 300
  detectMultiplier: 6
  minimumTtl: 254 # singlehop 254
