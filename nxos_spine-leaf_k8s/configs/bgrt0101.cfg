username cisco password 5 $5$FCPIIG$RRagIkHJeow6kxDTamd2Xsp4TUkeGCRQeVdz0pHwlD0  role network-admin
username cisco passphrase  lifetime 99999 warntime 14 gracetime 3
ssh key rsa 2048 
